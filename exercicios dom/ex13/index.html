<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ex13</title>
    <style>
        .cabecalho{
            background-image: linear-gradient(180deg, rgb(255, 255, 255), rgb(219, 219, 219));
            height: 90px;
            margin:-10px -8px 0px -9px;
            border-bottom: 1px solid rgb(139, 138, 138);
        }
        .branco{
            color: white;
           background-image: linear-gradient(180deg, rgb(0, 0, 0), rgb(43, 43, 43));
        }
        .botao{
            position: absolute;
            left: 85%;
            top: 1%;
            width: 70px;
            height: 70px;
            color:rgb(255, 255, 255);
            background-color: rgb(0, 0, 0);
            border:none;
            border-radius: 10px;
        }
        .botaobranco{
            color: rgb(0, 0, 0);
            background-color: aliceblue;
        }
    
        .principal{
            text-align: center;
        }
        .principalbranco{
            background-color: black;
            color: aliceblue;
        }
    </style>
</head>
<body>
    <header class="cabecalho">
        <input type="button" value="claro" class="botao">
    </header>
    <main class="principal">
        <h1>Bem vindo!</h1>
        <p>este é um site exemplo</p>
    </main>
    <script>
        let butao = document.querySelector('.botao')
        let cabecalho = document.querySelector('.cabecalho')
        let main = document.querySelector('.principal')

        butao.addEventListener('click', clicar)
        function clicar(){
            cabecalho.classList.toggle('branco')
            butao.classList.toggle('botaobranco')
            main.classList.toggle('principalbranco')
            if (butao.classList.contains('botaobranco')){
                butao.value='escuro'
            }
            else{
                butao.value='claro'
            }
            console.log(cabecalho)
        }
    </script>
</body>
</html>
